<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Silas Martins">
    <meta name="description" content="Super Trunfo baseado no Brasileirão 2021">
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script src="./scripts.js"></script>
    <title>Super Trunfo Brasileirão 2021</title>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <h1 class="page-title">Super Trunfo Brasilerão Série A 2021</h1>
      <button onclick="sortearCarta()" id="btnSortear">Sortear carta</button>
      <button
        class="button-jogar"
        type="button"
        id="btnJogar"
        onclick="jogar()"
        disabled="false"
      >
        Jogar
      </button>
      <form id="form">
        <h2>Escolha o seu atributo</h2>
        <div class="wrapper">
          <div>
            <div id="carta-jogador">
              <img
                src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                style="width: inherit; height: inherit; position: absolute"
              />
            </div>
          </div>
          <button
            class="button-jogar"
            type="button"
            id="btnJogar2"
            onclick="jogar()"
            disabled="false"
          >
            Jogar
          </button>
          <div>
            <div id="carta-maquina" class="carta">
              <img
                src="https://www.alura.com.br/assets/img/imersoes/dev-2021/card-super-trunfo-transparent-ajustado.png"
                style="width: inherit; height: inherit; position: absolute"
              />
            </div>
          </div>
        </div>
        <button
          type="button"
          id="btnProximaRodada"
          onclick="proximaRodada()"
          disabled="true"
        >
          Jogar Novamente
        </button>
        <div id="resultado"></div>
      </form>
    </div>
  </body>
</html>
